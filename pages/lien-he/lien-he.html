<!-- Nhúng thư viện icon nếu file tổng của bạn chưa có -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<div class="idecor-contact-section">
    <div class="idecor-contact-container">
        <!-- Tiêu đề trang -->
        <div class="idecor-contact-header">
            <h1 class="idecor-contact-title">Liên Hệ Với iDECOR</h1>
            <p class="idecor-contact-subtitle">iDECOR luôn lắng nghe và đồng hành cùng không gian sống mơ ước của bạn</p>
        </div>

        <!-- Khung nội dung chia làm 2 cột -->
        <div class="idecor-contact-grid">
            
            <!-- Cột bên trái: Thông tin liên hệ -->
            <div class="idecor-info-card">
                <h2 class="idecor-card-title">Thông Tin</h2>
                
                <div class="idecor-info-item">
                    <i class="fa-solid fa-location-dot idecor-info-icon"></i>
                    <div class="idecor-info-text">
                        <h3>Địa Chỉ</h3>
                        <p>25 Nguyễn Khuyến, Văn Miếu,<br>Đống Đa, Hà Nội</p>
                    </div>
                </div>

                <div class="idecor-info-item">
                    <i class="fa-solid fa-phone idecor-info-icon"></i>
                    <div class="idecor-info-text">
                        <h3>Điện Thoại</h3>
                        <p>0987 123 456</p>
                    </div>
                </div>

                <div class="idecor-info-item">
                    <i class="fa-solid fa-envelope idecor-info-icon"></i>
                    <div class="idecor-info-text">
                        <h3>Email</h3>
                        <p>contact@idecor.vn</p>
                    </div>
                </div>

                <div class="idecor-info-item">
                    <i class="fa-solid fa-clock idecor-info-icon"></i>
                    <div class="idecor-info-text">
                        <h3>Giờ Làm Việc</h3>
                        <p>Thứ 2 - Thứ 6: 8:00 - 21:00</p>
                        <p>Thứ 7 - Chủ Nhật: 9:00 - 20:00</p>
                    </div>
                </div>
            </div>

            <!-- Cột bên phải: Form gửi tin nhắn -->
            <div class="idecor-form-card">
                <h2 class="idecor-card-title">Gửi Tin Nhắn</h2>
                
                <form id="idecorContactForm" class="idecor-contact-form">
                    <div class="idecor-form-row">
                        <div class="idecor-form-group">
                            <label><i class="fa-solid fa-user"></i> Họ và Tên</label>
                            <input type="text" id="contactName" required placeholder="Nhập họ và tên...">
                        </div>
                        <div class="idecor-form-group">
                            <label><i class="fa-solid fa-envelope"></i> Email</label>
                            <input type="email" id="contactEmail" required placeholder="Nhập địa chỉ email...">
                        </div>
                    </div>

                    <div class="idecor-form-group">
                        <label><i class="fa-solid fa-phone"></i> Số Điện Thoại</label>
                        <input type="tel" id="contactPhone" required placeholder="Nhập số điện thoại...">
                    </div>

                    <div class="idecor-form-group">
                        <label><i class="fa-solid fa-tags"></i> Chủ Đề</label>
                        <select id="contactSubject" required>
                            <option value="" disabled selected>Chọn chủ đề bạn quan tâm</option>
                            <option value="Tu vấn thiết kế 3D">Tư vấn thiết kế 3D (Nhận quà tặng đặc quyền)</option>
                            <option value="Thi công trọn gói">Thi công nội thất trọn gói</option>
                            <option value="Mua sắm Combo">Combo nội thất Luxury</option>
                            <option value="Bảo dưỡng định kỳ">Đặt lịch bảo dưỡng định kỳ</option>
                        </select>
                    </div>

                    <div class="idecor-form-group">
                        <label><i class="fa-solid fa-comment-dots"></i> Nội Dung</label>
                        <textarea id="contactMessage" rows="5" required placeholder="Lời nhắn hoặc yêu cầu cụ thể của bạn..."></textarea>
                    </div>

                    <button type="submit" class="idecor-btn-submit">
                        Gửi Tin Nhắn <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>
