<main class="checkout-page">

    <div class="checkout-container">

        <!-- TIÊU ĐỀ -->
        <div class="checkout-header">

            <h1>
                Thanh Toán Đơn Hàng
            </h1>

            <div class="checkout-step">

                <span>
                    Giỏ hàng
                </span>

                <span>
                    >
                </span>

                <span class="active">
                    Thanh toán
                </span>

                <span>
                    >
                </span>

                <span>
                    Hoàn tất
                </span>

            </div>

        </div>

        <div class="checkout-layout">

            <!-- CỘT TRÁI -->
            <div class="checkout-left">

                <!-- SẢN PHẨM -->
                <section
                    class="checkout-section"
                    id="order-section">
                </section>

                <!-- THÔNG TIN NHẬN HÀNG -->
                <section
                    class="checkout-section"
                    id="shipping-section">
                </section>

                <!-- PHƯƠNG THỨC THANH TOÁN -->
                <section
                    class="checkout-section"
                    id="payment-section">
                </section>

            </div>

            <!-- CỘT PHẢI -->
            <div class="checkout-right">

                <!-- TÓM TẮT ĐƠN -->
                <section
                    class="checkout-section"
                    id="summary-section">
                </section>

                <!-- QR / MOMO / COD -->
                <section
                    class="checkout-section"
                    id="payment-extra-section">
                </section>

            </div>

        </div>

    </div>

</main>
